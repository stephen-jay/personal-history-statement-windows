<div class="analytics-wrap">
  <h2>Personnel Graphing Analysis</h2>
  <p class="analytics-subtitle">Auto-generated from submitted personnel records.</p>

  <div class="analytics-kpis">
    <div class="analytics-kpi">
      <div class="analytics-kpi-label">Total Personnel</div>
      <div class="analytics-kpi-value" id="kpi-total">0</div>
    </div>
    <div class="analytics-kpi">
      <div class="analytics-kpi-label">With Age Info</div>
      <div class="analytics-kpi-value" id="kpi-age-filled">0</div>
    </div>
    <div class="analytics-kpi">
      <div class="analytics-kpi-label">Updated This Month</div>
      <div class="analytics-kpi-value" id="kpi-updated-month">0</div>
    </div>
  </div>

  <div class="analytics-grid">
    <div class="analytics-card">
      <h3>Sex Distribution</h3>
      <div id="chart-sex"></div>
    </div>
    <div class="analytics-card">
      <h3>Marital Status Distribution</h3>
      <div id="chart-marital"></div>
    </div>
    <div class="analytics-card">
      <h3>Age Brackets</h3>
      <div id="chart-age"></div>
    </div>
    <div class="analytics-card">
      <h3>Submissions (Last 6 Months)</h3>
      <div id="chart-monthly"></div>
    </div>
    <div class="analytics-card">
      <h3>Top Present Assignments</h3>
      <div id="chart-assignment"></div>
    </div>
  </div>
</div>

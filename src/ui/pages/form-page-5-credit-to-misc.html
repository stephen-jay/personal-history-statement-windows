<!-- PAGE 5: IX-XIII. CREDIT, ARREST, REPUTATION, ORGS, MISC -->
<div class="form-page" data-page="5">
  <fieldset class="section">
    <legend>IX. CREDIT REPUTATION</legend>
    <div class="row">
      <label>Entirely dependent on salary? If NO, state other source of income</label>
      <input type="text" id="salaryDependent" placeholder="YES or NO + other source" />
    </div>
    <div class="row">
      <label>Banks/Credit Institutions (Name, Address, Nature of Accounts)</label>
      <div id="banks-credit-rows"></div>
      <button type="button" class="btn small secondary form-add-row" id="add-banks-credit-row">Add Row</button>
    </div>
    <div class="row">
      <label>Filed Statement of Asset and Liabilities? Agency and when?</label>
      <input type="text" id="salFiled" placeholder="Yes/No, agency, date" />
    </div>
    <div class="row">
      <label>Filed last income tax return? Amount paid last Calendar Year</label>
      <input type="text" id="incomeTaxFiled" placeholder="Yes/No, amount" />
    </div>
    <div class="row">
      <label>Three (3) credit references in the Philippines (Name, Address)</label>
      <div id="credit-references-rows"></div>
      <button type="button" class="btn small secondary form-add-row" id="add-credit-references-row">Add Row</button>
    </div>
  </fieldset>

  <fieldset class="section">
    <legend>X. ARREST RECORD AND CONDUCT</legend>
    <div class="row">
      <label>Ever investigated/arrested, indicted or convicted? If YES, state court, offense, disposition</label>
      <input type="text" id="arrestRecord" placeholder="NO or details if YES" />
    </div>
    <div class="row">
      <label>Immediate family member investigated/arrested? If YES, state details</label>
      <input type="text" id="familyArrest" placeholder="NO or details if YES" />
    </div>
    <div class="row">
      <label>Charged in any Administrative Case? If YES, explain</label>
      <input type="text" id="adminCase" placeholder="NO or explain if YES" />
    </div>
    <div class="row">
      <label>Arrested/detained pursuant to PD 1081? If YES, state nature & place of detention</label>
      <input type="text" id="pd1081" placeholder="NO or details if YES" />
    </div>
    <div class="row">
      <label>Use intoxicating liquor or Illegal Drugs? If YES, to what extent?</label>
      <input type="text" id="liquorDrugs" placeholder="NO or extent if YES" />
    </div>
  </fieldset>

  <fieldset class="section">
    <legend>XI. GENERAL REPUTATION</legend>
    <div class="row">
      <label>Five (5) character references (not relatives, known 3+ years) — Name, Address</label>
      <div id="character-refs-rows"></div>
      <button type="button" class="btn small secondary form-add-row" id="add-character-refs-row">Add Row</button>
    </div>
    <div class="row">
      <label>Three (3) neighbors at present residence — Name, Address</label>
      <div id="neighbors-rows"></div>
      <button type="button" class="btn small secondary form-add-row" id="add-neighbors-row">Add Row</button>
    </div>
  </fieldset>

  <fieldset class="section">
    <legend>XII. ORGANIZATIONS</legend>
    <div class="row">
      <label>Organizations/social groups — Organization, Address, Date of Membership, Position Held</label>
      <div id="organizations-rows"></div>
      <button type="button" class="btn small secondary form-add-row" id="add-organizations-row">Add Row</button>
    </div>
  </fieldset>

  <fieldset class="section">
    <legend>XIII. MISCELLANEOUS</legend>
    <div class="row">
      <label>Hobbies, sports and past times</label>
      <input type="text" id="hobbies" placeholder="e.g. Basketball, Reading" />
    </div>
    <div class="row">
      <label>Language / Dialect, Speak, Read, Write (indicate ability as fluent, fair or poor)</label>
      <div id="languages-rows"></div>
      <button type="button" class="btn small secondary form-add-row" id="add-languages-row">Add Row</button>
    </div>
    <div class="row">
      <label>Willing to undergo periodic lie detector test?</label>
      <select id="lieDetector"><option value="">—</option><option value="Yes">Yes</option><option value="No">No</option></select>
    </div>

    <div class="row">
      <label>Upload image for personnel handwritten entry</label>
      <div class="upload-photo-panel handwritten-upload-panel">
        <p class="upload-photo-panel-title">Personnel handwritten entry</p>
        <label class="photo-box photo-box--handwritten photo-upload-trigger" id="handwriting-box" for="handwriting-upload" title="Click to upload handwritten entry">
          <img id="handwriting-preview" class="photo-preview" alt="Personnel handwritten entry preview" style="display:none" />
          <span id="handwriting-placeholder-text">Click to upload handwritten entry</span>
        </label>
        <input type="file" id="handwriting-upload" accept="image/*" class="sr-only" />
        <input type="hidden" id="handwrittenEntryDataUrl" />
        <div class="photo-caption"><em>Accepted: JPG, PNG, WEBP</em></div>
      </div>
    </div>

    <div class="thumb-photo-grid">
      <div class="thumb-mark-panel">
        <p class="thumb-mark-title">Thumb mark</p>
        <div class="thumb-boxes">
          <div>
            <div class="thumb-box" role="img" aria-label="Left thumb mark area"></div>
            <div class="thumb-caption">(Left)</div>
          </div>
          <div>
            <div class="thumb-box" role="img" aria-label="Right thumb mark area"></div>
            <div class="thumb-caption">(Right)</div>
          </div>
        </div>
      </div>

      <div class="upload-photo-panel">
        <p class="upload-photo-panel-title">Upload photo</p>
        <label class="photo-box photo-upload-trigger" id="photo-box" for="photo-upload" title="Click to upload">
          <img id="photo-preview" class="photo-preview" alt="2x2 Photo Preview" style="display:none" />
          <span id="photo-placeholder-text">2×2 — Click to upload</span>
        </label>
        <input type="file" id="photo-upload" accept="image/*" class="sr-only" />
        <input type="hidden" id="photoDataUrl" />
        <div class="photo-caption"><em>Passport size (2×2) picture</em></div>
      </div>

      <div class="upload-photo-panel">
        <p class="upload-photo-panel-title">Upload signature</p>
        <label class="photo-box photo-box--signature photo-upload-trigger" id="signature-box" for="signature-upload" title="Click to upload signature">
          <img id="signature-preview" class="photo-preview" alt="Signature preview" style="display:none" />
          <span id="signature-placeholder-text">Click to upload signature</span>
        </label>
        <input type="file" id="signature-upload" accept="image/*" class="sr-only" />
        <input type="hidden" id="signatureDataUrl" />
        <div class="photo-caption"><em>Accepted: JPG, PNG, WEBP</em></div>
      </div>
    </div>

  </fieldset>
</div>

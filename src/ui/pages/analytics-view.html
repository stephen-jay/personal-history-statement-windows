<link rel="stylesheet" href="css/analysis.css">
<link rel="stylesheet" href="css/dashboard-loader.css">

<!-- Dashboard-specific loader and content container -->
<div id="dashboard-loader" hidden>
  <div class="db-loader-dots">
    <div class="db-loader-dot"></div>
    <div class="db-loader-dot"></div>
    <div class="db-loader-dot"></div>
  </div>
  <div class="db-loader-text">Loading dashboard...</div>
  </div>

<div id="dashboard-content">
  <div class="analysis-wrap">
  <h2>Personnel Graphing Analysis</h2>

  <div class="kpi-row" role="region" aria-label="Key performance indicators">
    <div class="kpi-card kpi-card--clickable kpi-card--blue" data-kpi-filter="education" role="button" tabindex="0" aria-label="View personnel with educational records">
      <div class="kpi-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z" />
          <path d="M2 17l10 5 10-5" />
          <path d="M2 12l10 5 10-5" />
        </svg>
      </div>
      <div class="kpi-value" id="kpi-education-records">0</div>
      <div class="kpi-label">With Educational Records</div>
    </div>
    <div class="kpi-card kpi-card--clickable kpi-card--red" data-kpi-filter="no-education" role="button" tabindex="0" aria-label="View personnel with no educational records">
      <div class="kpi-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M15 9l-6 6" />
          <path d="M9 9l6 6" />
        </svg>
      </div>
      <div class="kpi-value" id="kpi-no-education-records">0</div>
      <div class="kpi-label">No Educational Records</div>
    </div>
    <div class="kpi-card kpi-card--clickable kpi-card--teal" data-kpi-filter="college" role="button" tabindex="0" aria-label="View college graduates">
      <div class="kpi-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6" />
          <path d="M2 10l10-5 10 5-10 5-10-5z" />
          <path d="M6 12v5c3 3 9 3 12 0v-5" />
        </svg>
      </div>
      <div class="kpi-value" id="kpi-college-graduate">0</div>
      <div class="kpi-label">College Graduate</div>
    </div>
    <div class="kpi-card kpi-card--clickable kpi-card--navy" data-kpi-filter="all" role="button" tabindex="0" aria-label="View all personnel">
      <div class="kpi-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </div>
      <div class="kpi-value" id="kpi-total">0</div>
      <div class="kpi-label">Total Personnel</div>
    </div>
  </div>

  <div class="middle-row">
    <div class="card left-card">
      <h3>Organization Breakdown</h3>
      <div id="chart-org-breakdown"></div>
    </div>
    <div class="card right-card">
      <h3>Recent Activity</h3>
      <div id="recent-activity-list"></div>
    </div>
  </div>

  <div class="full-card">
    <h3>Training &amp; Seminars Breakdown</h3>
    <div id="chart-training-breakdown"></div>
  </div>

  <div class="full-card">
    <h3>Graduation Year Brackets</h3>
    <div id="chart-grad-brackets"></div>
  </div>

</div>

<!-- Education list modal for Analysis view -->
<div id="analysis-edu-modal" class="analysis-edu-modal" aria-hidden="true">
  <div id="analysis-edu-backdrop" class="analysis-edu-backdrop" tabindex="-1"></div>
  <div class="analysis-edu-dialog" role="dialog" aria-modal="true" aria-labelledby="analysis-edu-title">
    <div class="analysis-edu-header">
      <h3 id="analysis-edu-title">Education</h3>
      <button type="button" id="analysis-edu-close" class="analysis-edu-close" aria-label="Close">✕</button>
    </div>
    <div id="analysis-edu-list" class="analysis-edu-list" style="max-height:420px;overflow:auto;padding:8px;"></div>
  </div>
</div>

<!-- Organization list modal for Analysis view -->
<div id="analysis-org-modal" class="analysis-edu-modal" aria-hidden="true">
  <div id="analysis-org-backdrop" class="analysis-edu-backdrop" tabindex="-1"></div>
  <div class="analysis-edu-dialog" role="dialog" aria-modal="true" aria-labelledby="analysis-org-title">
    <div class="analysis-edu-header">
      <h3 id="analysis-org-title">Organization</h3>
      <button type="button" id="analysis-org-close" class="analysis-edu-close" aria-label="Close">✕</button>
    </div>
    <div id="analysis-org-list" class="analysis-edu-list" style="max-height:420px;overflow:auto;padding:8px;"></div>
  </div>
</div>

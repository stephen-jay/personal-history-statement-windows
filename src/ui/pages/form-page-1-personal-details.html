<!-- PAGE 1: I. PERSONAL DETAILS -->
<div class="form-page active" data-page="1">
  <fieldset class="section">
    <legend>I. PERSONAL DETAILS</legend>
    <div class="row three-cols">
      <div>
        <label>Name (Last)</label>
        <input type="text" id="nameLast" placeholder="Surname" required />
      </div>
      <div>
        <label>Name (First)</label>
        <input type="text" id="nameFirst" placeholder="First name" required />
      </div>
      <div>
        <label>Name (Middle/Maternal)</label>
        <input type="text" id="nameMiddle" placeholder="Middle name" />
      </div>
    </div>
    <div class="row">
      <label>ORGANIZATION</label>
      <input type="text" id="organization" placeholder="e.g. Member - DepEd / DOH / PNP / AFP" required />
    </div>
    <div class="row">
      <label>PRESENT JOB/ASSIGNMENT</label>
      <input type="text" id="presentJob" placeholder="Current position/assignment" required />
    </div>
    <div class="row">
      <label>BUSINESS OR DUTY ADDRESS</label>
      <input type="text" id="businessAddress" placeholder="Office/duty address" />
    </div>
    <div class="row">
      <label>HOME ADDRESS (Include Street &amp; No)</label>
      <input type="text" id="homeAddress" placeholder="Street, Barangay, City, Province, ZIP" required />
    </div>
    <div class="row two-cols">
      <div>
        <label>DATE OF BIRTH</label>
        <input type="date" id="dateOfBirth" required max="2026-04-24" />
      </div>
      <div>
        <label>PLACE OF BIRTH</label>
        <input type="text" id="placeOfBirth" placeholder="City/Municipality, Province" required />
      </div>
    </div>
    <div class="row two-cols">
      <div>
        <label>CHANGE IN NAME (If by Court Action give details)</label>
        <input type="text" id="changeInName" placeholder="N/A if none" />
      </div>
      <div>
        <label>NICKNAMES</label>
        <input type="text" id="nicknames" placeholder="N/A if none" />
      </div>
    </div>
    <div class="row two-cols">
      <div>
        <label>NATIONALITY</label>
        <input type="text" id="nationality" placeholder="e.g. Filipino" required />
      </div>
      <div>
        <label>TAX IDENTIFICATION NR</label>
        <input type="text" id="taxId" placeholder="TIN (000-000-000-000)" pattern="\d{3}-\d{3}-\d{3}-\d{4}" title="Please enter TIN in format 000-000-000-000" />
      </div>
    </div>
    <div class="row two-cols">
      <div>
        <label>TEL NO</label>
        <input type="tel" id="telNo" placeholder="Landline" />
      </div>
      <div>
        <label>MOBILE PHONE NR</label>
        <input type="tel" id="mobile" placeholder="09xx xxx xxxx" required pattern="09\d{9}" title="Please enter an 11-digit mobile number starting with 09" />
      </div>
    </div>
    <div class="row">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="email" placeholder="email@example.com" required />
    </div>
    <div class="row two-cols">
      <div>
        <label>PASSPORT NR</label>
        <input type="text" id="passportNr" placeholder="N/A if none" />
      </div>
      <div>
        <label>DATE OF EXPIRATION (Passport)</label>
        <input type="date" id="passportExpiry" />
      </div>
    </div>
  </fieldset>
</div>

<!-- PAGE 1: I. PERSONAL DETAILS -->
<div class="form-page active" data-page="1">
  <fieldset class="section">
    <legend>I. PERSONAL DETAILS</legend>
    <div class="row three-cols">
      <div>
        <label>Name (Last)</label>
        <input type="text" id="nameLast" placeholder="Surname" />
      </div>
      <div>
        <label>Name (First)</label>
        <input type="text" id="nameFirst" placeholder="First name" />
      </div>
      <div>
        <label>Name (Middle/Maternal)</label>
        <input type="text" id="nameMiddle" placeholder="Middle name" />
      </div>
    </div>
    <div class="row">
      <label>PRESENT JOB/ASSIGNMENT</label>
      <input type="text" id="presentJob" placeholder="Current position/assignment" />
    </div>
    <div class="row">
      <label>BUSINESS OR DUTY ADDRESS</label>
      <input type="text" id="businessAddress" placeholder="Office/duty address" />
    </div>
    <div class="row">
      <label>HOME ADDRESS (Include Street &amp; No)</label>
      <input type="text" id="homeAddress" placeholder="Street, Barangay, City, Province, ZIP" />
    </div>
    <div class="row two-cols">
      <div>
        <label>DATE OF BIRTH</label>
        <input type="date" id="dateOfBirth" />
      </div>
      <div>
        <label>PLACE OF BIRTH</label>
        <input type="text" id="placeOfBirth" placeholder="City/Municipality, Province" />
      </div>
    </div>
    <div class="row two-cols">
      <div>
        <label>CHANGE IN NAME (If by Court Action give details)</label>
        <input type="text" id="changeInName" placeholder="N/A if none" />
      </div>
      <div>
        <label>NICKNAMES</label>
        <input type="text" id="nicknames" placeholder="N/A if none" />
      </div>
    </div>
    <div class="row two-cols">
      <div>
        <label>NATIONALITY</label>
        <input type="text" id="nationality" placeholder="e.g. Filipino" />
      </div>
      <div>
        <label>TAX IDENTIFICATION NR</label>
        <input type="text" id="taxId" placeholder="TIN" />
      </div>
    </div>
    <div class="row two-cols">
      <div>
        <label>TEL NO</label>
        <input type="tel" id="telNo" placeholder="Landline" />
      </div>
      <div>
        <label>MOBILE PHONE NR</label>
        <input type="tel" id="mobile" placeholder="09xx xxx xxxx" />
      </div>
    </div>
    <div class="row">
      <label>EMAIL ADDRESS</label>
      <input type="email" id="email" placeholder="email@example.com" />
    </div>
    <div class="row two-cols">
      <div>
        <label>PASSPORT NR</label>
        <input type="text" id="passportNr" placeholder="N/A if none" />
      </div>
      <div>
        <label>DATE OF EXPIRATION (Passport)</label>
        <input type="date" id="passportExpiry" />
      </div>
    </div>
  </fieldset>
</div>

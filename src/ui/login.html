<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data: blob:;" />
  <title>Personnel History Statement System - Login</title>
  <link rel="stylesheet" href="css/login.css" />
</head>
<body>
  <main class="login-main" role="main">
    <section class="login-shell" aria-label="System sign in">
      <div class="login-left">
        <div class="brand-wrap" aria-label="Personnel History Statement System">
          <div class="brand-seal" aria-hidden="true">
            <svg viewBox="0 0 48 48" width="36" height="36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="24" cy="24" r="21" stroke="currentColor" stroke-width="1.6" stroke-opacity="0.45"/>
              <circle cx="24" cy="24" r="16" stroke="currentColor" stroke-width="1.2" stroke-opacity="0.3"/>
              <path d="M24 12L27 21H36L29 26L32 35L24 30L16 35L19 26L12 21H21L24 12Z" fill="currentColor" fill-opacity="0.2"/>
            </svg>
          </div>
          <div class="brand-text">
            <p class="brand-mini">Welcome to</p>
            <h1>PHS System</h1>
          </div>
        </div>

        <form id="login-form" novalidate>
          <label for="username">Username</label>
          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 0 0-16 0"/>
                <circle cx="12" cy="8" r="4"/>
              </svg>
            </span>
            <input id="username" name="username" type="text" placeholder="Enter your username" autocomplete="username" required />
          </div>

          <label for="password">Password</label>
          <div class="field-wrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="11" width="16" height="10" rx="2"/>
                <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
              </svg>
            </span>
            <input id="password" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button class="toggle-password" id="toggle-password" type="button" aria-label="Show password" aria-pressed="false">
              <svg class="icon-eye" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" width="18" height="18" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s4-7 10-7c2.4 0 4.5.8 6.2 2"/>
                <path d="M22 12s-4 7-10 7c-2.4 0-4.5-.8-6.2-2"/>
                <path d="m3 3 18 18"/>
              </svg>
            </button>
          </div>

          <div class="forgot-wrap">
            <button type="button" class="linkish">Forgot Password?</button>
          </div>

          <button id="sign-in" class="sign-in-btn" type="submit">LOGIN</button>
          <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
        </form>

        <p class="login-footer-links">FAQ | Features | Support</p>
      </div>

      <div class="login-right" aria-hidden="true">
        <div class="right-inner">
          <div class="about-logos" aria-hidden="true">
            <img class="about-logo" src="images/thinktech.png" alt="ThinkTech logo" />
            <img class="about-logo" src="images/ansys.png" alt="Ansys logo" />
            <img class="about-logo about-logo--hendexis" src="images/hendexis.png" alt="Hendexis logo" />
          </div>
          <h2>About PHS</h2>
          <p>
            The Personnel History Statement (PHS) System centralizes personnel records,
            standardizes printable form output, and supports accurate reporting in one secure platform.
          </p>
          <p class="about-build">Version 1.0.0 · Build 2026.03</p>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
